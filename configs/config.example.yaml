timezone: Asia/Shanghai

tapd:
  base_url: https://api.tapd.cn
  auth_mode: bearer
  task_done_statuses:
    - done
    - 已完成
  bug_closed_statuses:
    - resolved
    - verified
    - rejected
    - closed
    - 已解决
    - 已验证
    - 已关闭
    - 无需解决
  fields:
    task_owner: owner
    bug_owner: current_owner
    story_pm: owner
  status_labels:
    tasks:
      open: 未开始
      progressing: 进行中
      done: 已完成
    bugs:
      new: 新
      in_progress: 接受/处理
      resolved: 已解决
      verified: 已验证
      reopened: 重新打开
      rejected: 无需解决
      postponed: 延期解决
      closed: 已关闭
    stories:
      status_2: 需求待处理
      status_8: 需求已分析
      status_9: 定开需求待处理
      status_10: 定开优先级确认
      status_11: 定开优先级确认完成
      status_3: 需求规划设计中
      status_15: 需求评审
      status_16: UI评审
      status_7: 需求待排期
      status_12: 开发实现
      status_17: 已提测
      status_19: 测试验证
      status_20: 产品验收
      status_18: 产品已验收
      status_21: 发布
      status_14: 项目已验收
      rejected: 已拒绝
      status_22: 未开始
      status_23: 进行中
      status_24: 已完成

report:
  public_base_url: https://tapd-daily.internal.example.com
  output_dir: ./public/reports

dingtalk:
  notifier: webhook
  webhook: ${DINGTALK_WEBHOOK}
  secret: ${DINGTALK_SECRET}
  at_mobiles: []
  is_at_all: false

