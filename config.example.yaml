timezone: Asia/Shanghai

tapd:
  base_url: https://api.tapd.cn
  auth_mode: bearer
  task_done_statuses:
    - done
    - 已完成
    - 已关闭
  bug_closed_statuses:
    - 已解决
    - 已关闭
    - 无需解决
  fields:
    task_owner: owner
    bug_owner: current_owner
    story_pm: owner

report:
  public_base_url: https://tapd-daily.internal.example.com
  output_dir: ./public/reports

dingtalk:
  notifier: webhook
  webhook: ${DINGTALK_WEBHOOK}
  secret: ${DINGTALK_SECRET}
  at_mobiles: []
  is_at_all: false

projects:
  - name: 示例项目
    workspace_id: "33002756"
    iterations:
      - name: 2026-05 Sprint
        iteration_id: "sprint-1"
    members:
      - name: 张三
        tapd_user: zhangsan
        role: dev
        tapd_report_url: https://tapd.cn/member/zhangsan
      - name: 李四
        tapd_user: lisi
        role: test
        tapd_report_url: https://tapd.cn/member/lisi
    product_managers:
      - name: 产品A
        tapd_user: product_a

